<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluxy - Cadastro e Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/auth.css" />
</head>
<body>
  <main class="auth-layout">
    <section class="auth-hero">
      <img src="assets/fluxy-logo.svg" alt="Fluxy" class="logo-auth" />
      <p>Crie sua conta e acesse seu painel com segurança.</p>
      <ul>
        <li>✔ Cadastro rápido</li>
        <li>✔ Login com validação</li>
        <li>✔ Sessão persistente no navegador</li>
      </ul>
      <a class="btn btn-secondary" href="index.html">Voltar para Home</a>
    </section>

    <section class="auth-card" aria-live="polite">
      <div class="tabs" role="tablist" aria-label="Autenticação">
        <button id="tab-login" class="tab is-active" type="button" role="tab" aria-selected="true" aria-controls="panel-login">Entrar</button>
        <button id="tab-register" class="tab" type="button" role="tab" aria-selected="false" aria-controls="panel-register">Criar conta</button>
      </div>

      <form id="panel-login" class="form is-active" role="tabpanel" aria-labelledby="tab-login" novalidate>
        <h2>Entrar na conta</h2>
        <label for="login-email">E-mail</label>
        <input id="login-email" name="email" type="email" autocomplete="email" required />

        <label for="login-password">Senha</label>
        <input id="login-password" name="password" type="password" autocomplete="current-password" minlength="6" required />

        <button type="submit" class="btn">Entrar</button>
      </form>

      <form id="panel-register" class="form" role="tabpanel" aria-labelledby="tab-register" hidden novalidate>
        <h2>Criar conta</h2>
        <label for="register-name">Nome</label>
        <input id="register-name" name="name" type="text" autocomplete="name" minlength="2" required />

        <label for="register-email">E-mail</label>
        <input id="register-email" name="email" type="email" autocomplete="email" required />

        <label for="register-password">Senha</label>
        <input id="register-password" name="password" type="password" autocomplete="new-password" minlength="6" required />

        <label for="register-confirm">Confirmar senha</label>
        <input id="register-confirm" name="confirmPassword" type="password" autocomplete="new-password" minlength="6" required />

        <button type="submit" class="btn">Criar conta</button>
      </form>

      <div id="auth-message" class="message" hidden></div>
      <div id="session-box" class="session" hidden>
        <p id="session-text"></p>
        <button id="logout-btn" class="btn btn-secondary" type="button">Sair</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
